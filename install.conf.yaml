- defaults:
    link:
      create: true
      force: true
    shell:
      stdout: true
      stderr: true

- clean: ["~"]

- shell:
    - [git submodule update --init --recursive, Updating submodules]

- link:
    ~/.hushlogin: .hushlogin
    ~/.gitconfig: git/.gitconfig
    ~/.gitignore_global: git/.gitignore_global
